<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Farming Techniques</title>
  <link rel="stylesheet" href="farming.css">
</head>
<body>

<!-- Navbar -->
<header class="navbar">
  <div class="logo">🌱 KisanSetu</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Crops</a>
    <a class="active" href="#">Farming Techniques</a>
    <a href="#">Market Prices</a>
    <a href="#">Schemes</a>
  </nav>
</header>

<!-- Main Layout -->
<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h3>All Categories</h3>
    <ul>
      <li data-cat="Traditional Techniques">Traditional Techniques</li>
      <li data-cat="Modern & Mechanized">Modern & Mechanized</li>
      <li data-cat="Sustainable & Eco-Friendly">Sustainable</li>
      <li data-cat="Innovative & Emerging">Innovative</li>
    </ul>
  </aside>

  <!-- Content -->
  <main class="content">

    <h1>Farming Techniques Hub</h1>
    <p>Explore time-tested and modern innovations.</p>

    <!-- Techniques Grid -->
    <div id="techniques-container"></div>

  </main>

</div>

<script>
async function loadTechniques() {
  const res = await fetch("http://localhost:5000/api/techniques");
  const data = await res.json();

  renderTechniques(data);
}

function renderTechniques(data) {
  const container = document.getElementById("techniques-container");
  container.innerHTML = "";

  const grouped = {};

  data.forEach(item => {
    if (!grouped[item.category]) {
      grouped[item.category] = [];
    }
    grouped[item.category].push(item);
  });

  for (let category in grouped) {
    const section = document.createElement("div");
    section.classList.add("section");

    section.innerHTML = `
      <div class="section-header">
        <h2>${category}</h2>
        <span>${grouped[category].length} Techniques</span>
      </div>
      <div class="cards"></div>
    `;

    const cards = section.querySelector(".cards");

    grouped[category].forEach(item => {
      const card = document.createElement("div");
      card.classList.add("card");

      card.innerHTML = `
        <img src="${item.image}" />
        <div class="card-body">
          <h3>${item.title}</h3>
          <p>${item.description}</p>
          <span class="badge">${item.badge}</span>
        </div>
      `;

      cards.appendChild(card);
    });

    container.appendChild(section);
  }
}

loadTechniques();
</script>

</body>
</html>
